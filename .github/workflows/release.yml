name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
      actions: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12.9'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        
        # 🛠️ MANUAL VGAMEPAD INSTALL (Bypass interactive driver prompt)
        # 1. Download source
        curl -L https://github.com/yannbouteiller/vgamepad/archive/refs/tags/v0.1.0.zip -o vgamepad.zip
        # 2. Extract
        powershell Expand-Archive vgamepad.zip -DestinationPath vgamepad_src
        # 3. Move the 'vgamepad' folder into the local site-packages
        $site_packages = python -c "import site; print(site.getsitepackages()[0])"
        Move-Item -Path "vgamepad_src/vgamepad-0.1.0/vgamepad" -Destination $site_packages -Force
        
        # Install remaining dependencies (ignoring vgamepad in requirements if it fails)
        pip install customtkinter keyboard google-genai pyinstaller
      env:
        PYTHONIOENCODING: utf-8

    - name: Build with PyInstaller
      run: |
        pyinstaller --noconsole --onefile --name virtual_controller_manager --collect-all customtkinter --collect-all vgamepad virtual_controller.py

    - name: Generate Custom Release Notes
      run: python scripts/generate_release_notes.py
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        files: dist/virtual_controller_manager.exe
        body_path: RELEASE_NOTES.md
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
